# This file is managed by terraform-github-modules. Do not edit manually.
# It enforces the Otto review gate security control.
name: Otto Review Gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  statuses: write
  pull-requests: read

jobs:
  review-gate:
    runs-on:
      group: arc-public-large-amd64-runner
    permissions:
      statuses: write
      pull-requests: read

    steps:
      - name: Check Otto PR self-review
        uses: worldcoin/gh-actions-public/otto-review-gate@91542a4ac323bad702cf7e53be5351a112f26d5d
        # More information: https://github.com/worldcoin/gh-actions-public/tree/main/otto-review-gate
        with:
          pr_number: ${{ github.event.pull_request.number }}
          head_sha: ${{ github.event.pull_request.head.sha }}
